name: Deploy IB Tracker to GitHub Pages

# Runs every time you push to the main branch
on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Check out your repository files
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Replace every %%PLACEHOLDER%% in index.html with the
      #    real secret values stored in GitHub Secrets vault.
      #    The secrets are NEVER printed in logs or stored in files.
      - name: Inject Firebase secrets into index.html
        env:
          FIREBASE_API_KEY:             ${{ secrets.FIREBASE_API_KEY }}
          FIREBASE_AUTH_DOMAIN:         ${{ secrets.FIREBASE_AUTH_DOMAIN }}
          FIREBASE_PROJECT_ID:          ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_STORAGE_BUCKET:      ${{ secrets.FIREBASE_STORAGE_BUCKET }}
          FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          FIREBASE_APP_ID:              ${{ secrets.FIREBASE_APP_ID }}
        run: |
          sed -i "s|%%FIREBASE_API_KEY%%|$FIREBASE_API_KEY|g"                        index.html
          sed -i "s|%%FIREBASE_AUTH_DOMAIN%%|$FIREBASE_AUTH_DOMAIN|g"                index.html
          sed -i "s|%%FIREBASE_PROJECT_ID%%|$FIREBASE_PROJECT_ID|g"                  index.html
          sed -i "s|%%FIREBASE_STORAGE_BUCKET%%|$FIREBASE_STORAGE_BUCKET|g"          index.html
          sed -i "s|%%FIREBASE_MESSAGING_SENDER_ID%%|$FIREBASE_MESSAGING_SENDER_ID|g" index.html
          sed -i "s|%%FIREBASE_APP_ID%%|$FIREBASE_APP_ID|g"                          index.html

      # 3. Deploy to GitHub Pages
      #    publish_dir: ./ means "deploy everything in the root folder"
      #    destination_dir: sets the subfolder on the live site
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          exclude_assets: '.github,*.yml,*.yaml,*.md'
